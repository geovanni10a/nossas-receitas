<body class="pagina-capa">
  <div class="fundo-livro"></div>
  <main class="intro-livro" aria-live="polite">
    <div class="intro-utilidades">
      <div id="sync-status-home" class="painel-status-shell"></div>
      <button class="botao-secundario botao-utilitario theme-toggle" id="toggle-theme-home" type="button">Tema automatico</button>
      <button class="botao-secundario botao-utilitario" id="toggle-motion-home" type="button">Movimento automatico</button>
    </div>

    <section class="mesa-livro">
      <div class="livro-intro-shell" id="intro-shell">
        <div class="livro-preview" id="preview" aria-hidden="true">
          <div class="pagina-preview">
            <p class="sobretitulo">Indice do livro</p>
            <h2>Sabores guardados em familia</h2>
            <div class="preview-categorias" id="preview-categorias"></div>
            <a class="botao-secundario" href="livro.html">Ir para o indice completo</a>
          </div>
        </div>
        <button class="capa-livro" id="abrir-livro" aria-label="Abrir o livro de receitas e revelar o indice de categorias">
          <span class="capa-brilho"></span>
          <span class="capa-conteudo">
            <span class="capa-kicker">Caderno da cozinha</span>
            <strong>Nossas Receitas</strong>
            <span class="capa-subtitulo">Memorias, cheiros e pratos para repetir</span>
            <span class="botao-capa">Abrir o livro</span>
          </span>
        </button>
      </div>
    </section>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/diagnostics.js"></script>
