<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https://rurqwnwomrssnhxhsgfh.supabase.co wss://rurqwnwomrssnhxhsgfh.supabase.co; font-src 'self' https://fonts.gstatic.com data:; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'">
  <title>Nossas Receitas | Adicionar receita</title>
  <meta name="theme-color" content="#A0522D">
  <meta name="description" content="Adicione ou edite receitas do livro Nossas Receitas.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:title" content="Nossas Receitas | Adicionar receita">
  <meta property="og:description" content="Salve novas receitas da familia com foto, ingredientes e modo de preparo.">
  <meta property="og:image" content="assets/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nossas Receitas | Adicionar receita">
  <meta name="twitter:description" content="Salve novas receitas da familia com foto, ingredientes e modo de preparo.">
  <meta name="twitter:image" content="assets/og.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>(function(){try{var key="nr_theme";var stored=window.localStorage.getItem(key);var preference=stored==="light"||stored==="dark"?stored:"auto";var media=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");var resolved=preference==="auto"?(media&&media.matches?"dark":"light"):preference;document.documentElement.dataset.theme=resolved;document.documentElement.dataset.themePreference=preference;document.documentElement.style.colorScheme=resolved;}catch(error){}})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Lato:wght@400;700&family=Lora:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="pagina-admin">
  <a class="skip-link" href="#conteudo-principal">Pular para o conteudo principal</a>
  <div class="fundo-livro"></div>
  <main class="admin-layout" id="conteudo-principal" tabindex="-1">
    <header class="admin-topo">
      <div>
        <p class="sobretitulo">Nossas Receitas</p>
        <h1 id="admin-titulo">Adicionar receita</h1>
      </div>
      <div class="admin-acoes-topo">
        <div id="sync-status-admin" class="painel-status-shell"></div>
        <button class="botao-secundario botao-utilitario theme-toggle" id="toggle-theme-admin" type="button">Tema automatico</button>
        <button class="botao-secundario botao-utilitario" id="toggle-motion-admin" type="button">Movimento automatico</button>
        <a class="botao-secundario" href="livro.html">Voltar ao livro</a>
        <button class="botao-perigo" id="delete-recipe" type="button" hidden>Excluir receita</button>
      </div>
    </header>

    <form class="form-receita" id="recipe-form" novalidate>
      <div class="form-grid">
        <section class="card-admin">
          <h2>Informacoes principais</h2>

          <label class="campo">
            <span>Titulo</span>
            <input type="text" id="titulo" maxlength="100" required>
            <small class="erro" data-erro="titulo"></small>
          </label>

          <label class="campo">
            <span>Categoria</span>
            <select id="categoria" required></select>
            <small class="erro" data-erro="categoria"></small>
          </label>

          <label class="campo" id="nova-categoria-shell" hidden>
            <span>Nova categoria</span>
            <input type="text" id="nova-categoria" maxlength="60" placeholder="Ex: Paes e fermentados">
            <small class="erro" data-erro="novaCategoria"></small>
          </label>

          <label class="campo">
            <span>Foto</span>
            <input type="file" id="foto" accept="image/*">
            <small class="erro" data-erro="foto"></small>
          </label>

          <div class="preview-imagem" id="preview-imagem">
            <img id="preview-foto" alt="Pre-visualizacao da foto da receita">
          </div>
          <p class="status-foto" id="foto-status" hidden aria-live="polite">Processando foto...</p>

          <div class="campos-linha">
            <label class="campo">
              <span>Tempo de preparo</span>
              <input type="text" id="tempo-preparo" placeholder="30 min">
            </label>

            <label class="campo">
              <span>Tempo de forno</span>
              <input type="text" id="tempo-forno" placeholder="45 min">
            </label>
          </div>

        <div class="campos-linha">
          <label class="campo">
            <span>Porcoes</span>
            <input type="number" id="porcoes" min="1" step="1" placeholder="8">
            <small class="erro" data-erro="porcoes"></small>
          </label>

          <label class="campo">
            <span>Dificuldade</span>
            <select id="dificuldade">
                <option value="Facil">Facil</option>
                <option value="Medio">Medio</option>
                <option value="Dificil">Dificil</option>
              </select>
            </label>
          </div>

          <div class="campo">
            <span>Tags</span>
            <div class="tags-input-shell" id="tags-shell">
              <div class="tags-lista" id="tags-lista"></div>
              <input type="text" id="tag-input" placeholder="Digite e pressione Enter ou virgula">
            </div>
            <small class="erro" data-erro="tags"></small>
          </div>

          <label class="campo">
            <span>Dica</span>
            <textarea id="dica" rows="4" placeholder="Uma observacao especial sobre a receita"></textarea>
          </label>

          <label class="campo">
            <span>Video do preparo (YouTube)</span>
            <input type="url" id="video-url" inputmode="url" placeholder="https://www.youtube.com/watch?v=...">
            <small class="erro" data-erro="videoUrl"></small>
          </label>
        </section>

        <section class="card-admin">
          <div class="bloco-lista">
            <div class="bloco-topo">
              <h2>Ingredientes</h2>
              <button class="botao-secundario" type="button" id="add-ingredient">+ Adicionar</button>
            </div>
            <small class="erro" data-erro="ingredientes"></small>
            <div class="lista-dinamica" id="ingredientes-lista"></div>
          </div>

          <div class="bloco-lista">
            <div class="bloco-topo">
              <h2>Modo de preparo</h2>
              <button class="botao-secundario" type="button" id="add-step">+ Adicionar</button>
            </div>
            <small class="erro" data-erro="modoPreparo"></small>
            <div class="lista-dinamica" id="passos-lista"></div>
          </div>
        </section>
      </div>

      <footer class="rodape-form">
        <div class="toast" id="toast" hidden role="status" aria-live="polite"></div>
        <button class="botao-primario" id="btn-salvar-receita" type="submit">Salvar receita</button>
      </footer>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync-status.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
